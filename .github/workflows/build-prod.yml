name: Build and Push Production Images

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-prod.yml'
      - 'Dockerfile.postgres'
      - 'docker-compose.prod.yml'
      - 'api-web/**'
      - 'api-worker/**'
      - 'common/**'
      - 'scrapling-api/**'

concurrency:
  group: build-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-sha:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ai_trading_bot-postgres
            file: Dockerfile.postgres
            context: .
          - image: ai_trading_bot-api-web
            file: api-web/Dockerfile
            context: .
          - image: ai_trading_bot-api-worker
            file: api-worker/Dockerfile
            context: .
          - image: ai_trading_bot-scrapling
            file: scrapling-api/Dockerfile
            context: scrapling-api/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deterministic image variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable SHA images
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
