services:
  postgres:
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql

  redis:
    volumes:
      - ./volumes/redisdata:/data

  redis-sessions:

  n8n:
    ports:
      - "5678:5678"
    volumes:
      - /Users/priyodip/.n8n:/home/node/.n8n

  n8n-worker:
    volumes:
      - /Users/priyodip/.n8n:/home/node/.n8n

  api-web:
    ports:
      - "8080:8080"
      - "9001:9001"
    environment:
      # Dev auth overrides — prevents inheriting production values from docker-compose.yml
      AUTH_ENV: development
      AUTH_EXCHANGE_TURNSTILE_ENFORCE: "0"
      COOKIE_SECURE: "false"

  api-worker:
    volumes:
      - ./api-worker/scripts:/app/scripts

  scraper:
    ports:
      - "8000:8000"
    volumes:
      - ./scraper/scraped_data:/app/scraped_data
