# Production override profile.
# Usage:
#   docker compose --env-file .env.prod \
#     -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Validate merged config:
#   docker compose --env-file .env.prod \
#     -f docker-compose.yml -f docker-compose.prod.yml config

services:
  n8n:
    ports:
      - "127.0.0.1:5678:5678"

  api-web:
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8080:8080"

  api-sse:
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:8081:8081"

  api-worker:
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:9001:9001"

  scrapling:
    ports:
      - "127.0.0.1:8010:8010"