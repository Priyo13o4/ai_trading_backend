services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: custom-postgres-timescale:pg18
    restart: always
    container_name: n8n-postgres
    command: postgres -c shared_preload_libraries=timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql

  redis:
    image: redis:latest
    restart: always
    container_name: n8n-redis
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - ./volumes/redisdata:/data

  redis-sessions:
    image: redis:latest
    restart: always
    container_name: redis-sessions
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --appendonly no

  n8n:
    image: n8nio/n8n:2.0.3
    restart: always
    container_name: ai_trading_bot
    depends_on:
      - postgres
      - redis
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb 
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_RUNNERS_ENABLED: "true"
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      N8N_EDITOR_BASE_URL: ${N8N_BASE_URL}
      WEBHOOK_URL: ${N8N_BASE_URL}
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
    volumes:
      - /Users/priyodip/.n8n:/home/node/.n8n

  n8n-worker:
    image: n8nio/n8n:2.0.3
    restart: always
    container_name: n8n-worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_RUNNERS_ENABLED: "true"
    volumes:
      - /Users/priyodip/.n8n:/home/node/.n8n
    command: worker

  api:
    build: ./api
    container_name: tradingbot-api
    restart: always
    env_file:
      - .env
    environment:
      DATA_SOURCE: MT5
      MT5_INGEST_ENABLE: "true"
      MT5_INGEST_HOST: 0.0.0.0
      MT5_INGEST_PORT: 9001
      MT5_PROTOCOL_DEBUG: "true"
      LOG_LEVEL: DEBUG
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - postgres
      - redis
      - redis-sessions
    ports:
      - "8080:8080"
      - "9001:9001"
    volumes:
      - ./scripts:/app/scripts
      - /Volumes/My Drive/Priyodip/college notes and stuff/Coding stuff (Vs code)/Docker Projects/MT5_stuff/Tick_Data:/app/Tick_Data:ro
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'
        reservations:
          memory: 2g
          cpus: '2.0'

  scraper:
    build: ./scraper
    container_name: tradingbot-scraper
    restart: unless-stopped
    environment:
      - HEADLESS=True
      - DEFAULT_TIMEOUT=30
      - SELENIUM_TIMEOUT=30
      - PAGE_LOAD_TIMEOUT=30
      - HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - ./scraper/scraped_data:/app/scraped_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.25'
  news-analyzer:
    build: ./news_analyzer
    container_name: tradingbot-news-analyzer
    restart: unless-stopped
    depends_on:
      - postgres
      - scraper
    env_file:
      - ./news_analyzer/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ai_trading_bot_data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SCRAPER_BASE_URL=${SCRAPER_BASE_URL:-http://tradingbot-scraper:8000}
      - SCRAPER_TIMEOUT=${SCRAPER_TIMEOUT:-300}
      - GEMINI_MODEL=gemini-3-flash-preview
    volumes:
      - ./news_analyzer:/app
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'
