services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: custom-postgres-timescale:pg18
    restart: always
    container_name: n8n-postgres
    command: postgres -c shared_preload_libraries=timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql
      # Init scripts run only on FIRST init of an empty PGDATA.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/continuous_aggregates.sql:/docker-entrypoint-initdb.d/02_continuous_aggregates.sql:ro
      - ./db/20260228_core_api_bootstrap.sql:/docker-entrypoint-initdb.d/03_core_api_bootstrap.sql:ro
      - ./db/20260221_create_calendar_events_tables.sql:/docker-entrypoint-initdb.d/04_calendar_events.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    restart: always
    container_name: n8n-redis
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    env_file:
      - .env
    volumes:
      - ./volumes/redisdata:/data

  redis-sessions:
    image: redis:latest
    restart: always
    container_name: redis-sessions
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --appendonly no
    env_file:
      - .env

  n8n:
    image: n8nio/n8n:2.6.0
    restart: always
    container_name: ai_trading_bot
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      N8N_EDITOR_BASE_URL: ${N8N_BASE_URL}
      WEBHOOK_URL: ${N8N_BASE_URL}
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-worker:
    image: n8nio/n8n:2.6.0
    restart: always
    container_name: n8n-worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n
    command: worker

  api-web:
    build:
      context: .
      dockerfile: api-web/Dockerfile
    container_name: tradingbot-api-web
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      USE_TIMESCALE_CAGGS: "true"
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_ENV: production
      TRUST_PROXY_HEADERS: "1"
      SESSION_BINDING_MODE: ${SESSION_BINDING_MODE:-off}
      AUTH_EXCHANGE_TURNSTILE_ENFORCE: "0"
      AUTHDBG_ENABLED: ${AUTHDBG_ENABLED:-0}
      # Explicit origin list for credentialed browser requests.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://pipfactor.com,https://www.pipfactor.com}
      # Covers subdomain forwarding/preview hosts under pipfactor.com.
      ALLOWED_ORIGIN_REGEX: ${ALLOWED_ORIGIN_REGEX:-^https://([a-zA-Z0-9_-]+\.)*pipfactor\.com$}
      STRATEGY_EXPIRY_JANITOR_INTERVAL_SECONDS: "30"
      STRATEGY_EXPIRY_JANITOR_MAX_BATCHES_PER_TICK: "5"
      # SSE connections live in api-sse; api-web only serves short-lived REST requests.
      # 4 workers is safe on 2-core machines. Override with GUNICORN_WORKERS env var.
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redis-sessions:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=5).read()\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-sse:
    build:
      context: .
      dockerfile: api-web/Dockerfile   # Reuses the same image: common + api-web/requirements
    container_name: tradingbot-api-sse
    restart: always
    ports:
      - "8081:8081"
    command: ["/app/sse_start.sh"]
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_ENV: production
      TRUST_PROXY_HEADERS: "1"
      SESSION_BINDING_MODE: ${SESSION_BINDING_MODE:-off}
      AUTHDBG_ENABLED: ${AUTHDBG_ENABLED:-0}
      # Number of Uvicorn workers. 2 is enough for a pure-async SSE service.
      SSE_WORKERS: ${SSE_WORKERS:-2}
    depends_on:
      redis:
        condition: service_started
      redis-sessions:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=5).read()\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  api-worker:
    build:
      context: .
      dockerfile: api-worker/Dockerfile
    container_name: tradingbot-api-worker
    restart: always
    ports:
      - "9001:9001"
    command: ["/app/worker_start.sh"]
    env_file:
      - .env
    environment:
      DATA_SOURCE: MT5
      MT5_INGEST_ENABLE: "true"
      MT5_INGEST_HOST: 0.0.0.0
      MT5_INGEST_PORT: 9001
      MT5_PROTOCOL_DEBUG: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      USE_TIMESCALE_CAGGS: "true"
      MT5_HEARTBEAT_FILE: /tmp/mt5_ingest_heartbeat
      MT5_HEARTBEAT_INTERVAL_SECONDS: 15
      MT5_HEARTBEAT_MAX_AGE_SECONDS: 120
      MT5_READY_CONNECTED_REDIS_KEY: mt5:ready:connected
      MT5_READY_SUBSCRIBED_REDIS_KEY: mt5:ready:subscribed
      MT5_READY_REDIS_TTL_SECONDS: 180
      # Recovery-mode resilience: avoid brittle scheduler exits during long catch-up windows.
      WORKER_SCHEDULER_REQUIRED: "true"
      WORKER_SCHEDULER_MAX_RESTARTS: "0"
      INDICATOR_UPDATER_CONSECUTIVE_FAILURE_THRESHOLD: "10"
      INDICATOR_UPDATER_TIMEOUT_SECONDS: "900"
      INDICATOR_MAX_NEW_BARS_PER_CYCLE: "8"
      INDICATOR_UPDATER_STARTUP_TIMEOUT_SECONDS: "7200"
      INDICATOR_MAX_NEW_BARS_PER_CYCLE_STARTUP: "50000"
      INDICATOR_LOOKBACK_BARS_STARTUP: "300"
      INDICATOR_SAFETY_BACKFILL_BARS_STARTUP: "2"
      WORKER_LOCK_TTL_SECONDS: "1200"
      WORKER_LOCK_TTL_SAFETY_MARGIN_SECONDS: "60"
      WORKER_LOCK_STRICT_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/mt5_ingest_heartbeat && python -c \"import os,time; f='/tmp/mt5_ingest_heartbeat'; max_age=120; now=time.time(); age=now-os.path.getmtime(f); raise SystemExit(0 if age <= max_age else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scraper:
    build: ./scraper
    container_name: tradingbot-scraper
    restart: unless-stopped
    environment:
      - HEADLESS=True
      - DEFAULT_TIMEOUT=30
      - SELENIUM_TIMEOUT=30
      - PAGE_LOAD_TIMEOUT=30
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.25'

  news-analyzer:
    build:
      context: .
      dockerfile: news_analyzer/Dockerfile
    container_name: tradingbot-news-analyzer
    restart: unless-stopped
    depends_on:
      - postgres
      - scraper
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ai_trading_bot_data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SCRAPER_BASE_URL=${SCRAPER_BASE_URL:-http://tradingbot-scraper:8000}
      - SCRAPER_TIMEOUT=${SCRAPER_TIMEOUT:-300}
      - GEMINI_MODEL=gemini-3-flash-preview
      - LOG_FILE_PATH=/app/logs/news_analyzer.log
    volumes:
      - ./news_analyzer/logs:/app/logs
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'

volumes:
  redisdata:
  n8n_data:
