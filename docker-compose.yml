services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: custom-postgres-timescale:pg18
    restart: always
    container_name: n8n-postgres
    command: postgres -c shared_preload_libraries=timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql
      # Init scripts run only on FIRST init of an empty PGDATA.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/continuous_aggregates.sql:/docker-entrypoint-initdb.d/02_continuous_aggregates.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    restart: always
    container_name: n8n-redis
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    env_file:
      - .env
    volumes:
      - ./volumes/redisdata:/data

  redis-sessions:
    image: redis:latest
    restart: always
    container_name: redis-sessions
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save ""
      --appendonly no
    env_file:
      - .env

  n8n:
    image: n8nio/n8n:2.6.0
    restart: always
    container_name: ai_trading_bot
    ports:
      - "5678:5678"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      N8N_EDITOR_BASE_URL: ${N8N_BASE_URL}
      WEBHOOK_URL: ${N8N_BASE_URL}
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-worker:
    image: n8nio/n8n:2.6.0
    restart: always
    container_name: n8n-worker
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n
    command: worker

  api-web:
    build:
      context: .
      dockerfile: api-web/Dockerfile
    container_name: tradingbot-api-web
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      # Use Timescale continuous aggregates for higher TFs (no Python re-aggregation).
      USE_TIMESCALE_CAGGS: "true"
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redis-sessions:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-worker:
    build:
      context: .
      dockerfile: api-worker/Dockerfile
    container_name: tradingbot-api-worker
    restart: always
    ports:
      - "9001:9001"
    command: ["/app/worker_start.sh"]
    env_file:
      - .env
    environment:
      DATA_SOURCE: MT5
      MT5_INGEST_ENABLE: "true"
      MT5_INGEST_HOST: 0.0.0.0
      MT5_INGEST_PORT: 9001
      MT5_PROTOCOL_DEBUG: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      USE_TIMESCALE_CAGGS: "true"
      MT5_HEARTBEAT_FILE: /tmp/mt5_ingest_heartbeat
      MT5_HEARTBEAT_INTERVAL_SECONDS: 15
      MT5_HEARTBEAT_MAX_AGE_SECONDS: 120
      MT5_READY_CONNECTED_REDIS_KEY: mt5:ready:connected
      MT5_READY_SUBSCRIBED_REDIS_KEY: mt5:ready:subscribed
      MT5_READY_REDIS_TTL_SECONDS: 180
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/mt5_ingest_heartbeat && python -c \"import os,time; f='/tmp/mt5_ingest_heartbeat'; max_age=120; now=time.time(); age=now-os.path.getmtime(f); raise SystemExit(0 if age <= max_age else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scraper:
    build: ./scraper
    container_name: tradingbot-scraper
    restart: unless-stopped
    environment:
      - HEADLESS=True
      - DEFAULT_TIMEOUT=30
      - SELENIUM_TIMEOUT=30
      - PAGE_LOAD_TIMEOUT=30
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.25'

  news-analyzer:
    build: ./news_analyzer
    container_name: tradingbot-news-analyzer
    restart: unless-stopped
    depends_on:
      - postgres
      - scraper
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ai_trading_bot_data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SCRAPER_BASE_URL=${SCRAPER_BASE_URL:-http://tradingbot-scraper:8000}
      - SCRAPER_TIMEOUT=${SCRAPER_TIMEOUT:-300}
      - GEMINI_MODEL=gemini-3-flash-preview
    command: tail -f /dev/null
    deploy:
      resources:
        limits:
          memory: 1.5g
          cpus: '1.0'
        reservations:
          memory: 512m
          cpus: '0.5'

volumes:
  redisdata:
  n8n_data:
