services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: custom-postgres-timescale:pg18
    restart: always
    container_name: n8n-postgres
    command: postgres -c shared_preload_libraries=timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/pgdata:/var/lib/postgresql
      # Init scripts run only on FIRST init of an empty PGDATA.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/continuous_aggregates.sql:/docker-entrypoint-initdb.d/02_continuous_aggregates.sql:ro
      - ./db/20260228_core_api_bootstrap.sql:/docker-entrypoint-initdb.d/03_core_api_bootstrap.sql:ro
      - ./db/20260221_create_calendar_events_tables.sql:/docker-entrypoint-initdb.d/04_calendar_events.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # =============================================================================
  # REDIS SEGMENTATION (Phase 4-D)
  # =============================================================================
  # Redis roles are isolated to prevent coupled failure domains:
  # - redis-queue: n8n queue operations (noeviction - queue data must persist)
  # - redis-app: api-web/sse cache/pubsub/locks (allkeys-lru - cache can evict)
  # - redis-sessions: auth sessions (no persistence - ephemeral)
  #
  # To enable segmentation, set these env vars in .env:
  #   QUEUE_REDIS_URL=redis://:${REDIS_PASSWORD}@redis-queue:6379/0
  #   APP_REDIS_URL=redis://:${REDIS_PASSWORD}@redis-app:6379/0
  #
  # Compose wiring uses redis-queue / redis-app directly.
  # =============================================================================

  redis-queue:
    image: redis:latest
    restart: always
    container_name: redis-queue
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    volumes:
      - ./volumes/redis-queue-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  redis-app:
    image: redis:latest
    restart: always
    container_name: redis-app
    command: >-
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./volumes/redis-app-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  redis-sessions:
    image: redis:latest
    restart: always
    container_name: redis-sessions
    command: >-
      redis-server
      --requirepass ${SESSION_REDIS_PASSWORD:-${REDIS_PASSWORD}}
      --save ""
      --appendonly no
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${SESSION_REDIS_PASSWORD:-${REDIS_PASSWORD}}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  n8n:
    image: n8nio/n8n:2.15.0
    restart: always
    container_name: ai_trading_bot
    depends_on:
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis-queue
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: "true"
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-${N8N_BASE_URL}}
      WEBHOOK_URL: ${WEBHOOK_URL:-${N8N_BASE_URL}}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n

  n8n-worker:
    image: n8nio/n8n:2.15.0
    restart: always
    container_name: n8n-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    environment:
      EXECUTIONS_MODE: queue
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis-queue
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_PROXY_HOPS: 1
    volumes:
      - n8n_data:/home/node/.n8n
    command: worker

  api-web:
    build:
      context: .
      dockerfile: api-web/Dockerfile
    container_name: tradingbot-api-web
    restart: always
    entrypoint: ["/app/docker_entrypoint.sh"]
    command: ["/app/start.sh"]
    env_file:
      - ${API_WEB_ENV_FILE:-./.env}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Redis configuration (app/cache/pubsub): redis-app
      REDIS_HOST: redis-app
      REDIS_PORT: 6379
      REDIS_DB: 0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      USE_TIMESCALE_CAGGS: "true"
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${SESSION_REDIS_PASSWORD:-${REDIS_PASSWORD}}
      APP_ENV: ${APP_ENV:-production}
      AUTH_ENV: ${AUTH_ENV:-${APP_ENV:-production}}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      SESSION_BINDING_MODE: ${SESSION_BINDING_MODE:-off}
      AUTH_EXCHANGE_TURNSTILE_ENFORCE: "0"
      AUTHDBG_ENABLED: ${AUTHDBG_ENABLED:-0}
      # Non-local deployments must set explicit CORS values.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://pipfactor.com,https://www.pipfactor.com}
      ALLOWED_ORIGIN_REGEX: ${ALLOWED_ORIGIN_REGEX:-^https://(www\.)?pipfactor\.com$}
      STRATEGY_EXPIRY_JANITOR_INTERVAL_SECONDS: "30"
      STRATEGY_EXPIRY_JANITOR_MAX_BATCHES_PER_TICK: "5"
      # SSE connections live in api-sse; api-web only serves short-lived REST requests.
      # 4 workers is safe on 2-core machines. Override with GUNICORN_WORKERS env var.
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      STARTUP_CHECK_ROLE: api-web
    depends_on:
      postgres:
        condition: service_healthy
      redis-app:
        condition: service_healthy
      redis-sessions:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; r=u.urlopen('http://localhost:8080/api/health', timeout=5); raise SystemExit(0 if r.getcode()==200 else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-sse:
    build:
      context: .
      dockerfile: api-web/Dockerfile   # Reuses the same image: common + api-web/requirements
    container_name: tradingbot-api-sse
    restart: always
    entrypoint: ["/app/docker_entrypoint.sh"]
    command: ["/app/sse_start.sh"]
    env_file:
      - ${API_SSE_ENV_FILE:-./.env}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Redis configuration (app/cache/pubsub): redis-app
      REDIS_HOST: redis-app
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_REDIS_HOST: redis-sessions
      SESSION_REDIS_PORT: 6379
      SESSION_REDIS_DB: 0
      SESSION_REDIS_PASSWORD: ${SESSION_REDIS_PASSWORD:-${REDIS_PASSWORD}}
      APP_ENV: ${APP_ENV:-production}
      AUTH_ENV: ${AUTH_ENV:-${APP_ENV:-production}}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      SESSION_BINDING_MODE: ${SESSION_BINDING_MODE:-off}
      AUTHDBG_ENABLED: ${AUTHDBG_ENABLED:-0}
      # Number of Uvicorn workers. 2 is enough for a pure-async SSE service.
      SSE_WORKERS: ${SSE_WORKERS:-2}
      STARTUP_CHECK_ROLE: api-sse
    depends_on:
      redis-app:
        condition: service_healthy
      redis-sessions:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; r=u.urlopen('http://localhost:8081/health', timeout=5); raise SystemExit(0 if r.getcode()==200 else 1)\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  api-worker:
    build:
      context: .
      dockerfile: api-worker/Dockerfile
    container_name: tradingbot-api-worker
    restart: always
    entrypoint: ["/app/docker_entrypoint.sh"]
    command: ["/app/worker_start.sh"]
    env_file:
      - ${API_WORKER_ENV_FILE:-./.env}
    environment:
      DATA_SOURCE: MT5
      MT5_INGEST_ENABLE: "true"
      MT5_INGEST_HOST: 0.0.0.0
      MT5_INGEST_PORT: 9001
      MT5_PROTOCOL_DEBUG: "true"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Redis configuration (app/cache/pubsub): redis-app
      REDIS_HOST: redis-app
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${TRADING_BOT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: ${SUPABASE_PROJECT_URL}
      SUPABASE_PROJECT_URL: ${SUPABASE_PROJECT_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      REFERRAL_REWARD_TRANSITIONS_ENABLED: ${REFERRAL_REWARD_TRANSITIONS_ENABLED:-false}
      REFERRAL_PAUSE_RESUME_WORKER_ENABLED: ${REFERRAL_PAUSE_RESUME_WORKER_ENABLED:-false}
      USE_TIMESCALE_CAGGS: "true"
      MT5_HEARTBEAT_FILE: /tmp/mt5_ingest_heartbeat
      MT5_HEARTBEAT_INTERVAL_SECONDS: 15
      MT5_HEARTBEAT_MAX_AGE_SECONDS: 120
      MT5_READY_CONNECTED_REDIS_KEY: mt5:ready:connected
      MT5_READY_SUBSCRIBED_REDIS_KEY: mt5:ready:subscribed
      MT5_READY_REDIS_TTL_SECONDS: 180
      # Recovery-mode resilience: avoid brittle scheduler exits during long catch-up windows.
      WORKER_SCHEDULER_REQUIRED: "true"
      WORKER_SCHEDULER_MAX_RESTARTS: "3"
      INDICATOR_UPDATER_CONSECUTIVE_FAILURE_THRESHOLD: "10"
      INDICATOR_UPDATER_TIMEOUT_SECONDS: "900"
      INDICATOR_MAX_NEW_BARS_PER_CYCLE: "8"
      INDICATOR_UPDATER_STARTUP_TIMEOUT_SECONDS: "1800"
      INDICATOR_MAX_NEW_BARS_PER_CYCLE_STARTUP: "128"
      INDICATOR_LOOKBACK_BARS_STARTUP: "300"
      INDICATOR_SAFETY_BACKFILL_BARS_STARTUP: "2"
      INDICATOR_MAX_NEW_BARS_PER_CYCLE_HARD_CAP: "256"
      INDICATOR_LOOKBACK_BARS_HARD_CAP: "600"
      INDICATOR_UPDATER_TIMEOUT_HARD_CAP_SECONDS: "3600"
      INDICATOR_MAX_SYMBOL_TIMEFRAMES_PER_RUN: "40"
      INDICATOR_MAX_RUNTIME_SECONDS_PER_RUN: "240"
      INDICATOR_COMPOSITE_M1_MAX_ROWS: "4000"
      WORKER_LOCK_TTL_SECONDS: "1200"
      WORKER_LOCK_TTL_SAFETY_MARGIN_SECONDS: "60"
      WORKER_LOCK_STRICT_MODE: "true"
      STARTUP_CHECK_ROLE: api-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/mt5_ingest_heartbeat && python -c \"import os,time; f='/tmp/mt5_ingest_heartbeat'; max_age=120; now=time.time(); age=now-os.path.getmtime(f); raise SystemExit(0 if age <= max_age else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scrapling:
    build:
      context: ./scrapling-api
    container_name: tradingbot-scrapling
    restart: unless-stopped
    environment:
      - SCRAPLING_HOST=0.0.0.0
      - SCRAPLING_PORT=8010
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256m
          cpus: '0.25'

volumes:
  n8n_data:
